# Mergify Configuration
# CI labeling and stale PR cleanup only — merging is always manual by repo owner

pull_request_rules:
  # Auto-close stale PRs (no activity for 14 days)
  - name: Close stale PRs
    conditions:
      - updated-at<14 days ago
      - -merged
      - -closed
    actions:
      comment:
        message: |
          This PR has been inactive for 14 days. Closing for housekeeping.
          Feel free to reopen if you'd like to continue working on it.
      close:
        message: Closed due to inactivity.

  # Label PRs by CI status
  - name: Label CI-passing PRs
    conditions:
      - check-success=CI / Lint & Format
      - check-success=CI / Test (Python 3.11)
      - check-success=CI / Test (Python 3.12)
      - check-success=CI / Test (Python 3.13)
    actions:
      label:
        add:
          - "ci-passing"

  - name: Label CI-failing PRs
    conditions:
      - or:
        - check-failure=CI / Lint & Format
        - check-failure=CI / Test (Python 3.11)
        - check-failure=CI / Test (Python 3.12)
        - check-failure=CI / Test (Python 3.13)
    actions:
      label:
        add:
          - "ci-failing"
      comment:
        message: |
          ⚠️ CI checks are failing. Please fix before this PR can be reviewed:

          ```bash
          # Run locally before pushing:
          ruff check contribai/          # lint
          ruff format contribai/ tests/  # format
          pytest tests/ -v               # tests (356+ expected)
          ```
